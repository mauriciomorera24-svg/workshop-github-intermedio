# workflow-roto.yml
#
# Este workflow tiene 4 errores intencionales.
# Objetivo: identificarlos y corregirlos sin ejecutar el archivo.
# Cuando termines, compara con la solución en exercises/01-actions-jobs/solucion.md
#
# Pista: los errores son de configuración, no de lógica de negocio.

name: Broken CI

on:
  push:
    branch:                    # ERROR 1
      - main

env:
  DOTNET_NOLOGO: true

jobs:
  format:
    runs-on: ubuntu-latests    # ERROR 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet restore
      - run: dotnet format --verify-no-changes

  test:
    runs-on: ubuntu-latest
    needs: formatting           # ERROR 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet restore
      - run: |
          dotnet test \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: reports/coverage/   # ERROR 4
          retention-days: 7
